<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <g transform="translate(20, 10) scale(1.4)">
  <!-- Tail -->
  <polygon points="64,96 54,112 74,112" fill="#E8453C"/>
  <polygon points="64,108 58,118 70,118" fill="#D63C34"/>
  <!-- Body -->
  <ellipse cx="64" cy="72" rx="28" ry="24" fill="#E8453C"/>
  <ellipse cx="64" cy="78" rx="18" ry="14" fill="#F4A39C"/>
  <!-- Claw arms -->
  <rect x="36" y="48" width="10" height="18" rx="4" fill="#E8453C" transform="rotate(-20 41 57)"/>
  <rect x="82" y="48" width="10" height="18" rx="4" fill="#E8453C" transform="rotate(20 87 57)"/>
  <!-- Left claw -->
  <circle cx="30" cy="45" r="14" fill="#E8453C"/>
  <circle cx="30" cy="45" r="9" fill="#F4A39C"/>
  <!-- Right claw -->
  <circle cx="98" cy="45" r="14" fill="#E8453C"/>
  <circle cx="98" cy="45" r="9" fill="#F4A39C"/>
  <!-- Eyes -->
  <circle cx="54" cy="60" r="7" fill="white"/>
  <circle cx="74" cy="60" r="7" fill="white"/>
  <circle cx="56" cy="60" r="3" fill="#222"/>
  <circle cx="76" cy="60" r="3" fill="#222"/>
  <circle cx="54" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="74" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <!-- Antennae -->
  <path d="M58,52 Q52,30 42,22" stroke="#E8453C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,52 Q76,30 86,22" stroke="#E8453C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="22" r="2.5" fill="#F4A39C"/>
  <circle cx="86" cy="22" r="2.5" fill="#F4A39C"/>
  <!-- Smile -->
  <path d="M58,70 Q64,76 70,70" stroke="#C0392B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="48" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <ellipse cx="80" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <!-- Headphones -->
  <path d="M40,54 Q40,36 64,36 Q88,36 88,54" stroke="#9B59B6" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <rect x="34" y="50" width="8" height="12" rx="4" fill="#9B59B6"/>
  <rect x="86" y="50" width="8" height="12" rx="4" fill="#9B59B6"/>
  <!-- Microphone in right claw -->
  <g transform="translate(100,34)">
    <rect x="-4" y="-10" width="8" height="14" rx="4" fill="#9B59B6"/>
    <line x1="0" y1="4" x2="0" y2="10" stroke="#7D3C98" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3" y1="10" x2="3" y2="10" stroke="#7D3C98" stroke-width="2" stroke-linecap="round"/>
    <!-- Mic grille lines -->
    <line x1="-2" y1="-6" x2="2" y2="-6" stroke="#8E44AD" stroke-width="0.6"/>
    <line x1="-2" y1="-3" x2="2" y2="-3" stroke="#8E44AD" stroke-width="0.6"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="#8E44AD" stroke-width="0.6"/>
  </g>
  </g>
  <text x="230" y="75" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#888" font-weight="400" letter-spacing="2">OPENCLAW</text>
  <text x="230" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" fill="#9B59B6" font-weight="700">Podcaster</text>
  <text x="230" y="165" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#999" font-weight="300">Agent</text>
</svg>
